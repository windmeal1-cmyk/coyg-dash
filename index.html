/* ═══════════ SVG 차트 ═══════════ */
const Spark = ({ data, w = 64, h = 22, color }) => {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const rng = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - 2 - ((v - min) / rng) * (h - 4)}`).join(" ");
  const c = color || (data[data.length - 1] >= data[0] ? "#F04452" : "#3182F6");
  return (
    <svg width={w} height={h} style={{ display: "block" }}>
      <polyline points={pts} fill="none" stroke={c} strokeWidth="1.6" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
};
const AreaChart = ({ data, w = 320, h = 90 }) => {
  if (!data || data.length < 2) return null;
  const vals = data.map((d) => d.v);
  const min = Math.min(...vals), max = Math.max(...vals);
  const rng = max - min || 1;
  const px = (i) => (i / (data.length - 1)) * w;
  const py = (v) => h - 6 - ((v - min) / rng) * (h - 16);
  const line = vals.map((v, i) => `${px(i)},${py(v)}`).join(" ");
  const up = vals[vals.length - 1] >= vals[0];
  const c = up ? "#EF0107" : "#3182F6";
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ display: "block" }}>
      <defs>
        <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={c} stopOpacity="0.18" />
          <stop offset="100%" stopColor={c} stopOpacity="0" />
        </linearGradient>
      </defs>
      <polygon points={`0,${h} ${line} ${w},${h}`} fill="url(#ag)" />
      <polyline points={line} fill="none" stroke={c} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={px(vals.length - 1)} cy={py(vals[vals.length - 1])} r="3" fill={c} />
    </svg>
  );
};
const Donut = ({ segments, size = 116, stroke = 15 }) => {
  const r = (size - stroke) / 2, C = 2 * Math.PI * r;
  let off = 0;
  const tot = segments.reduce((a, s) => a + s.v, 0) || 1;
  return (
    <svg width={size} height={size}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="#F1F3F6" strokeWidth={stroke} />
      {segments.filter((s) => s.v > 0).map((s, i) => {
        const frac = s.v / tot, dash = frac * C;
        const el = (
          <circle key={i} cx={size / 2} cy={size / 2} r={r} fill="none" stroke={s.color} strokeWidth={stroke}
            strokeDasharray={`${dash} ${C - dash}`} strokeDashoffset={-off}
            transform={`rotate(-90 ${size / 2} ${size / 2})`} strokeLinecap="butt" />
        );
        off += dash;
        return el;
      })}
    </svg>
  );
};

          st.map((h) => fetch(`https://finnhub.io/api/v1/quote?symbol=${h.symbol}&token=${apiKey}`).then((r) => (r.ok ? r.json() : Promise.reject())))
        );
        results.forEach((res, i) => {
          if (res.status === "fulfilled" && res.value.c > 0) {
            const q = res.value;
            next[st[i].symbol] = { price: q.c, chgPct: q.pc ? (q.c - q.pc) / q.pc : 0 };
          }
        });
        if (results.every((r) => r.status === "rejected")) setErr("주식 시세 실패 — API 키를 확인하세요");
      } else if (st.length && !apiKey) {
        setErr("주식 시세는 설정 탭에서 Finnhub API 키 등록 후 표시됩니다 (코인은 연동됨)");
      }
      // 국내(KRX) 종목: Yahoo 시세 — 프록시 3중 폴백 + 캐시버스터 + 6초 타임아웃
      const kr = holdings.filter((h) => h.type === "manual" && h.code);
      if (kr.length) {
        const PROXIES = [
          (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
          (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
          (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
        ];
        const fetchTO = (url, ms) => {
          const ctl = new AbortController();
          const t = setTimeout(() => ctl.abort(), ms);
          return fetch(url, { signal: ctl.signal }).finally(() => clearTimeout(t));
        };
        const fetchKr = async (code) => {
          const hint = krRouteRef.current[code] || {};
          const sufs = hint.suf ? [hint.suf, hint.suf === ".KS" ? ".KQ" : ".KS"] : [".KS", ".KQ"];
          const order = hint.px != null ? [hint.px, ...PROXIES.map((_, i) => i).filter((i) => i !== hint.px)] : PROXIES.map((_, i) => i);
          for (const suf of sufs) {
            const y = `https://query1.finance.yahoo.com/v8/finance/chart/${code}${suf}?range=1d&interval=1m&_=${Date.now()}`;
            for (const pi of order) {
              try {
                const r = await fetchTO(PROXIES[pi](y), 6000);
                if (!r.ok) continue;
                const d = await r.json();
                const meta = d?.chart?.result?.[0]?.meta;
                if (meta?.regularMarketPrice > 0) {
                  krRouteRef.current[code] = { suf, px: pi };
                  return { price: meta.regularMarketPrice, chgPct: meta.chartPreviousClose ? (meta.regularMarketPrice - meta.chartPreviousClose) / meta.chartPreviousClose : null };
                }
              } catch (e) {}
            }
          }
          return null;
        };
        const rs = await Promise.allSettled(kr.map((h) => fetchKr(h.code)));
        let krFail = 0;
        rs.forEach((r, i) => {
          if (r.status === "fulfilled" && r.value) next[kr[i].symbol] = { ...r.value, krw: true };
          else krFail++;
        });
        if (krFail === kr.length && kr.length > 0 && !next[kr[0].symbol]) setErr("국내 시세 프록시 응답 없음 — 잠시 후 자동 재시도 (수동 현재가로 표시 중)");
      }
      setPrices(next); setLastUpdate(new Date());
    } catch (e) { setErr("시세 조회 오류 — 네트워크를 확인하세요"); }
    setLoading(false);
  }, [holdings, apiKey, prices]);

  /* ── 오늘의 관심 시그널 스캔 (하루 1회) ──
     점수 = 낙폭40 + 컨센서스30 + 리밸런싱20 + 역추세10 (매수 추천 아님) */
  const runScan = useCallback(async () => {
    if (!apiKey) { setErr("시그널 스캔은 API 키가 필요합니다 (설정 탭)"); return; }
    if (scanning) return;
    setScanning(true); setScanProg(2);
    try {
      const map = {};
      holdings.filter((h) => h.type === "stock").forEach((h) => { map[h.symbol] = { name: h.name, sector: h.sector }; });
      Object.entries(POOL).forEach(([sec, list]) => list.forEach((p) => { if (!map[p.s]) map[p.s] = { name: p.n, sector: sec }; }));
      const syms = Object.keys(map);
      const raw = {};
      const CH = 12;
      for (let i = 0; i < syms.length; i += CH) {
        const part = syms.slice(i, i + CH);
        const rs = await Promise.allSettled(part.map(async (s) => {
          const [q, m] = await Promise.all([
            fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${apiKey}`).then((r) => (r.ok ? r.json() : null)),
            fetch(`https://finnhub.io/api/v1/stock/metric?symbol=${s}&metric=all&token=${apiKey}`).then((r) => (r.ok ? r.json() : null)),
          ]);
          return { s, q, m };
        }));
        rs.forEach((r) => {
          if (r.status === "fulfilled" && r.value.q?.c > 0) {
            raw[r.value.s] = { c: r.value.q.c, pc: r.value.q.pc, high: r.value.m?.metric?.["52WeekHigh"] || null };
          }
        });
        setScanProg(Math.round(((i + part.length) / syms.length) * 70));
        if (i + CH < syms.length) await new Promise((r) => setTimeout(r, 26000));
      }
      // 섹터 미달 (리밸런싱 가점)
      let stockV = 0; const secV = {};
      holdings.forEach((h) => {
        if (h.type === "crypto") return;
        const v = h.type === "manual" ? (h.pk || 0) * h.qty : (prices[h.symbol]?.price || 0) * h.qty * fx;
        stockV += v; secV[h.sector] = (secV[h.sector] || 0) + v;
      });
      const deficit = {};
      Object.entries(SECTORS).forEach(([k, s]) => {
        if (k === "crypto" || !stockV) return;
        deficit[k] = Math.max(0, s.target - (secV[k] || 0) / stockV);
      });
      // 예비 점수 (낙폭40 + 리밸20 + 역추세10)
      const pre = Object.entries(raw).map(([s, d]) => {
        const dd = d.high ? Math.max(0, 1 - d.c / d.high) : 0;
        const chg = d.pc ? (d.c - d.pc) / d.pc : 0;
        const ddS = Math.min(dd / 0.30, 1) * 40;
        const rebS = Math.min((deficit[map[s].sector] || 0) / 0.05, 1) * 20;
        const momS = chg < 0 ? Math.min(-chg / 0.03, 1) * 10 : 0;
        return { s, name: map[s].name, sector: map[s].sector, price: d.c, chg, dd, ddS, rebS, momS, pre: ddS + rebS + momS };
      }).sort((a, b) => b.pre - a.pre);
      // 상위 10개만 컨센서스 조회 (30점)
      const top = pre.slice(0, 10);
      setScanProg(82);
      const recs = await Promise.allSettled(
        top.map((t) => fetch(`https://finnhub.io/api/v1/stock/recommendation?symbol=${t.s}&token=${apiKey}`).then((r) => (r.ok ? r.json() : [])))
      );
      recs.forEach((r, i) => {
        let consS = 15, consPct = null; // ETF 등 컨센서스 없음 → 중립 15점
        if (r.status === "fulfilled" && Array.isArray(r.value) && r.value[0]) {
          const v = r.value[0];
          const tot = (v.strongBuy || 0) + (v.buy || 0) + (v.hold || 0) + (v.sell || 0) + (v.strongSell || 0);
          if (tot > 0) {
            consPct = ((v.strongBuy || 0) + (v.buy || 0)) / tot;
            consS = (((v.strongBuy || 0) * 1 + (v.buy || 0) * 0.7) / tot) * 30;
          }
        }
        top[i].consS = consS; top[i].consPct = consPct;
        top[i].score = Math.round(top[i].pre + consS);
      });
      top.sort((a, b) => b.score - a.score);
      setScan({
        d: todayStr(),
        res: top.slice(0, 3).map((t) => ({ s: t.s, name: t.name, sector: t.sector, price: t.price, chg: t.chg, dd: t.dd, consPct: t.consPct, reb: t.rebS > 4, score: t.score })),
      });
      setScanProg(100);
      showToast("오늘의 시그널 스캔 완료");
    } catch (e) { setErr("스캔 실패 — 잠시 후 다시 시도하세요"); }
    setScanning(false);
  }, [apiKey, holdings, prices, fx, scanning]);

  /* 하루 1회 자동 스캔 (첫 시세 로드 후) */

  const addHolding = (sec, s, n) => {
    if (holdings.some((h) => h.symbol === s)) { showToast(`${s}는 이미 목록에 있어요`); return; }
    setHoldings((hs) => [...hs, { id: s, type: "stock", symbol: s, name: n, sector: sec, w: 0, qty: 0, avg: 0 }]);

  };

  /* ── 계산 ── */
  const calc = useMemo(() => {
    let totV = 0, totC = 0, stockV = 0, cryptoV = 0, dayChg = 0;
    const rows = holdings.map((h) => {
      if (h.type === "manual") {
        const q = prices[h.symbol];
        const live = q?.krw && q.price > 0;
        const p = live ? q.price : (h.pk || 0);
        const v = p * h.qty;
        const c = (h.avg || 0) * h.qty;
        totV += v; totC += c;
        stockV += v;
        return { ...h, price: p, chgPct: live ? q.chgPct : null, live, value: v, cost: c, pl: v - c, plPct: c > 0 ? (v - c) / c : null };
      }
      const q = prices[h.symbol];
      const p = q?.price || 0;
      const v = p * h.qty * fx;
      const c = h.avg * h.qty * fx;
      totV += v; totC += c;
      if (q?.chgPct != null && v > 0) dayChg += v - v / (1 + q.chgPct);
      if (h.type === "crypto") cryptoV += v; else stockV += v;
      return { ...h, price: p, chgPct: q?.chgPct, value: v, cost: c, pl: v - c, plPct: c > 0 ? (v - c) / c : null };
    });
    const secAgg = {};
    Object.keys(SECTORS).forEach((k) => (secAgg[k] = 0));
    rows.forEach((r) => (secAgg[r.sector] += r.value));
    const bandAlerts = Object.entries(SECTORS).filter(([k, s]) => k !== "crypto" && stockV > 0 && Math.abs(secAgg[k] / stockV - s.target) > 0.05).map(([k]) => SECTORS[k].name);
    return { rows, totV, totC, pl: totV - totC, plPct: totC > 0 ? (totV - totC) / totC : null, stockV, cryptoV, secAgg, dayChg, dayChgPct: totV - dayChg > 0 ? dayChg / (totV - dayChg) : null, bandAlerts };
  }, [holdings, prices, fx]);

  /* ── 자산 스냅샷 (일 1회) ── */
  useEffect(() => {

    setHistory((h) => {

        if (Math.abs(last.v - calc.totV) < 1) return h;
        return [...h.slice(0, -1), { d, v: calc.totV }];

  const delH = (id) => setHoldings((hs) => hs.filter((h) => h.id !== id));

  /* ═══════════ 스타일 ═══════════ */
  const S = {
    app: { fontFamily: "-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR',sans-serif", color: "#191F28", minHeight: "100vh", maxWidth: 480, margin: "0 auto", paddingBottom: 84, fontSize: 14 },

                  <div style={{ fontWeight: 700 }}>{fmtKRW(amt)}</div>

                </div>

          })}
          <div style={S.row}>
            <span style={{ fontWeight: 700 }}>크립토 (직접운용)</span>
            <span style={{ fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{fmtKRW(cryptoAmt)}</span>
          </div>
          <div style={{ fontSize: 10.5, color: "#A6AEBB", marginTop: 8 }}>탐색에서 추가한 종목은 설정 탭에서 섹터 내 비중을 주면 반영됩니다</div>
        </div>

        <div style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 9 }}>
            <div style={S.label}>집행 체크리스트</div>

          </div>
          <div style={{ height: 5, background: "#F1F3F6", borderRadius: 3, marginBottom: 11 }}>

          </div>
          {tasks.map((tk, i) => (
            <div key={i} onClick={() => setTasks((ts) => ts.map((x, j) => (j === i ? { ...x, done: !x.done } : x)))}
              style={{ display: "flex", alignItems: "center", gap: 11, padding: "9.5px 0", borderBottom: "1px solid #F3F5F8", cursor: "pointer" }}>
              <div style={{ width: 21, height: 21, borderRadius: 7, border: `2px solid ${tk.done ? "#EF0107" : "#D5DAE0"}`, background: tk.done ? "#EF0107" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#FFF", fontWeight: 900, flexShrink: 0, transition: "all .15s" }}>
                {tk.done ? "✓" : ""}
              </div>
              <span style={{ fontSize: 13.5, color: tk.done ? "#A6AEBB" : "#191F28", textDecoration: tk.done ? "line-through" : "none" }}>{i + 1}. {tk.t}</span>
            </div>
          ))}
          <div style={{ fontSize: 10.5, color: "#A6AEBB", marginTop: 8 }}>매월 1일 자동 초기화</div>

  };

  /* ═══════════ 설정 ═══════════ */

  /* ── 스크린샷 AI 인식 ── */
  const guessSector = (name, symbol) => {
    for (const [sec, list] of Object.entries(POOL)) if (list.some((p) => p.s === symbol)) return sec;
    const n = (name || "").toLowerCase();
    if (/우주|방산|항공|defense|aero/.test(n)) return "aero";
    if (/배당|dividend|리츠|reit/.test(n)) return "div";
    if (/바이오|제약|bio|pharm|health/.test(n)) return "bio";
    if (/인프라|전력|철도|infra|util/.test(n)) return "infra";
    return "tech";
  };
  const aiImport = async (file) => {
    if (!aiKey) { setErr("AI 인식은 Anthropic API 키가 필요합니다 (아래 입력) — 무료로 하려면 스크린샷을 Claude 채팅에 올려 백업 텍스트를 받아 복원하세요"); return; }
    setImporting(true); setErr("");
    try {
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(",")[1]);
        r.onerror = () => rej(new Error("read fail"));
        r.readAsDataURL(file);
      });
      const mt = file.type === "image/png" ? "image/png" : "image/jpeg";
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": aiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-haiku-4-5",
          max_tokens: 1500,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: mt, data: b64 } },
              { type: "text", text: "이 증권앱 스크린샷에서 보유 종목을 추출해 JSON 배열만 출력해. 다른 텍스트·마크다운 금지. 스키마: [{\"name\":종목명, \"symbol\":미국티커(모르면 null), \"market\":\"US\"|\"KR\", \"qty\":수량, \"avgPrice\":평단(숫자), \"currency\":\"USD\"|\"KRW\", \"currentPrice\":현재가(없으면 null)}]. 한국 상장 종목(원화 표시·KRX ETF 등)은 market KR. 미국 종목의 한글명은 티커로 변환(예: 써클 인터넷 그룹→CRCL, 엔비디아→NVDA)." }
            ]
          }]
        })
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message || "API 오류");
      const text = (data.content || []).filter((c) => c.type === "text").map((c) => c.text).join("");
      const items = JSON.parse(text.replace(/```json|```/g, "").trim());
      let added = 0, skipped = 0;
      setHoldings((hs) => {
        let next = [...hs];
        items.forEach((it) => {
          const sym = (it.symbol || it.name || "").toUpperCase().slice(0, 12);
          if (!it.qty || next.some((h) => h.symbol === sym)) { skipped++; return; }
          if (it.market === "KR" || (!it.symbol && it.currency === "KRW")) {
            next.push({ id: sym + "_" + Date.now(), type: "manual", symbol: sym, name: it.name || sym, sector: guessSector(it.name, sym), w: 0, qty: it.qty, avg: it.avgPrice || 0, pk: it.currentPrice || 0 });
          } else {
            const avgUsd = it.currency === "KRW" ? Math.round(((it.avgPrice || 0) / fx) * 100) / 100 : (it.avgPrice || 0);
            next.push({ id: sym, type: "stock", symbol: sym, name: it.name || sym, sector: guessSector(it.name, sym), w: 0, qty: it.qty, avg: avgUsd });
          }
          added++;
        });
        return next;
      });
      showToast(`${added}개 종목 추가${skipped ? ` · ${skipped}개 중복/제외` : ""} — 섹터·비중 확인하세요`);
    } catch (e) {
      setErr("인식 실패: " + (e.message || "이미지를 다시 확인하세요"));
    }
    setImporting(false);
  };



  /* ── 앱 꾸미기: 이미지 업로드 (기기 저장, 자동 압축) ── */
  const compressImage = (file, maxDim, mime, q) => new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const cv = document.createElement("canvas");
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      cv.getContext("2d").drawImage(img, 0, 0, cv.width, cv.height);
      URL.revokeObjectURL(url);
      res(cv.toDataURL(mime, q));
    };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error("이미지 읽기 실패")); };
    img.src = url;
  });
  const setImage = async (kind, file) => {
    try {
      const data = kind === "logo"
        ? await compressImage(file, 512, "image/png")
        : await compressImage(file, 1280, "image/jpeg", 0.82);
      try { localStorage.setItem(kind === "logo" ? "coyg-logo" : "coyg-bg", data); }
      catch (e) { setErr("이미지 용량 초과 — 더 작은 사진을 선택하세요"); return; }
      if (kind === "logo") setLogoData(data); else setBgData(data);
      showToast(kind === "logo" ? "로고 적용됨" : "배경 적용됨");
    } catch (e) { setErr("이미지 처리 실패 — 다른 사진으로 시도하세요"); }
  };
  const clearImage = (kind) => {
    try { localStorage.removeItem(kind === "logo" ? "coyg-logo" : "coyg-bg"); } catch (e) {}
    if (kind === "logo") setLogoData(""); else setBgData("");
    showToast("제거됨 — repo의 파일이 있으면 그걸로 대체됩니다");

  /* ── 개별종목 검색·추가 ── */
  const settingsSearch = async () => {
    if (!apiKey) { setErr("종목 검색은 API 키가 필요합니다"); return; }
    let q = sQ.trim();
    if (!q) return;
    const alias = KR_ALIAS[q] || KR_ALIAS[q.replace(/\s/g, "")];
    if (alias) q = alias;
    setSBusy(true); setSSel(null);
    try {
      const r = await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(q)}&token=${apiKey}`);
      if (r.ok) {
        const d = await r.json();
        const list = (d.result || []).filter((x) => !x.symbol.includes(".") && !x.symbol.includes(":")).slice(0, 5);
        setSRes(list);
        if (list.length === 0) setErr("검색 결과 없음 — 영문 티커로 시도해 보세요 (국내 종목은 미지원)");
      }
    } catch (e) { setErr("검색 실패"); }
    setSBusy(false);
  };
  const pickResult = (x) => {
    setSSel({ symbol: x.symbol, name: x.description || x.symbol });
    setSSec(guessSector(x.description, x.symbol));
    setSAvg(""); setSQty(""); setSAmt("");
  };
  const onAmt = (v) => { setSAmt(v); const a = +sAvg; if (a > 0 && +v > 0) setSQty(String(Math.round((+v / fx / a) * 100) / 100)); };
  const onQty = (v) => { setSQty(v); const a = +sAvg; if (a > 0 && +v > 0) setSAmt(String(Math.round(+v * a * fx))); };
  const onAvg = (v) => { setSAvg(v); const a = +v; if (a > 0 && +sAmt > 0) setSQty(String(Math.round((+sAmt / fx / a) * 100) / 100)); };
  const addKr = () => {
    const code = kCode.trim().replace(/[^0-9]/g, "");
    if (code.length !== 6) { setErr("종목코드 6자리를 입력하세요 (토스·네이버증권에서 확인)"); return; }
    if (!(+kQty > 0) || !(+kAvg > 0)) { setErr("평단(₩)과 수량을 입력하세요"); return; }
    const sym = (kName.trim() || code).slice(0, 12);
    if (holdings.some((h) => h.code === code)) { setErr("이미 등록된 코드입니다"); return; }
    setHoldings((hs) => [...hs, { id: code + "_" + Date.now(), type: "manual", symbol: sym, name: kName.trim() || `KRX ${code}`, code, sector: sSec, w: 0, qty: +kQty, avg: +kAvg, pk: 0 }]);
    showToast(`${sym} 등록 — 시세 자동 연동`);
    setKCode(""); setKName(""); setKAvg(""); setKQty(""); setKrOpen(false);
    setTimeout(() => refreshPrices(), 400);
  };
  const addOwned = () => {
    if (!sSel || !(+sQty > 0) || !(+sAvg > 0)) { setErr("평단과 수량(또는 투입금액)을 입력하세요"); return; }
    const sym = sSel.symbol;
    setHoldings((hs) => {
      const ex = hs.find((h) => h.symbol === sym);
      if (ex) return hs.map((h) => (h.symbol === sym ? { ...h, qty: +sQty, avg: +sAvg } : h));
      return [...hs, { id: sym, type: "stock", symbol: sym, name: sSel.name, sector: sSec, w: 0, qty: +sQty, avg: +sAvg }];
    });
    showToast(`${sym} ${sQty}주 등록 완료`);
    setSSel(null); setSRes([]); setSQ("");
  };

  const doBackup = () => {
    const r = storageGet(STORE_KEY);
    setBackup(r?.value || "");
    showToast("아래 텍스트를 복사해 보관하세요");
  };
  const doRestore = () => {
    try {
      const d = JSON.parse(backup);
      if (!d.holdings) throw 0;
      storageSet(STORE_KEY, backup);
      window.location.reload();
    } catch (e) { setErr("복원 실패 — 올바른 백업 텍스트인지 확인하세요"); }

  const doReset = () => {
    if (window.confirm("모든 데이터(수량·평단·기록)를 초기화할까요? 되돌릴 수 없습니다.")) {

  const Settings = () => (
    <div className="fadein">
      <div style={S.card}>
        <div style={{ ...S.label, marginBottom: 8 }}>API · 환율</div>

        <div style={{ display: "flex", gap: 8 }}>
          <input style={{ ...S.input, flex: 1 }} type="number" value={fx} onChange={(e) => setFx(+e.target.value || 0)} />

      </div>


      {/* 앱 꾸미기 */}
      <div style={S.card}>

            {logoData ? <img src={logoData} alt="" style={{ width: "100%", height: "100%", objectFit: "contain" }} /> : <span style={{ fontSize: 10, color: "#A6AEBB" }}>로고</span>}

            로고 선택
            <input type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files?.[0]; if (f) setImage("logo", f); e.target.value = ""; }} />

            {bgData ? <img src={bgData} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 10, color: "#A6AEBB", display: "flex", alignItems: "center", justifyContent: "center", height: "100%" }}>배경</span>}

            배경 사진 선택
            <input type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => { const f = e.target.files?.[0]; if (f) setImage("bg", f); e.target.value = ""; }} />
          </label>
          {bgData && <button style={{ ...S.ghost, color: "#F04452" }} onClick={() => clearImage("bg")}>제거</button>}
        </div>
        <div style={{ fontSize: 10.5, color: "#8B95A1", marginBottom: 3 }}>배경 밝기 (왼쪽=사진 진하게 · 오른쪽=화이트 깔끔)</div>
        <input type="range" min="0.55" max="0.98" step="0.01" value={bgDim} onChange={(e) => setBgDim(+e.target.value)} style={{ width: "100%", accentColor: "#EF0107" }} />
        <div style={{ fontSize: 10.5, color: "#A6AEBB", marginTop: 8, lineHeight: 1.5 }}>
          이미지는 자동 압축(로고 512px·배경 1280px)되어 이 기기에만 저장됩니다 · 백업 텍스트에는 미포함 · 홈 화면 앱 아이콘은 repo의 logo.png 또는 단축어 방식 사용
        </div>
      </div>

      {/* 개별종목 — 검색해서 등록 */}
      <div style={S.card}>
        <div style={{ ...S.label, marginBottom: 8 }}>개별종목 등록 <span style={{ color: "#A6AEBB", textTransform: "none", letterSpacing: 0 }}>검색 → 선택 → 단가·금액 입력</span></div>
        <div style={{ display: "flex", gap: 8 }}>
          <input style={{ ...S.input, flex: 1 }} value={sQ} onChange={(e) => setSQ(e.target.value)}
            placeholder="티커·이름 (써클, NVDA, 팔란티어…)" onKeyDown={(e) => e.key === "Enter" && settingsSearch()} />
          <button style={S.btn} onClick={settingsSearch} disabled={sBusy}>{sBusy ? "…" : "검색"}</button>
        </div>

        {sRes.length > 0 && !sSel && (
          <div style={{ marginTop: 6 }} className="fadein">
            {sRes.map((x) => (
              <div key={x.symbol} style={{ ...S.row, cursor: "pointer" }} onClick={() => pickResult(x)}>
                <div style={{ minWidth: 0 }}>
                  <span style={{ fontWeight: 700, fontSize: 13.5 }}>{x.symbol}</span>
                  <span style={{ color: "#8B95A1", fontSize: 11.5, marginLeft: 7 }}>{x.description}</span>

        {/* 국내 종목 추가 */}

          <span style={{ fontSize: 12.5, fontWeight: 700 }}>🇰🇷 국내 주식·ETF 추가 <span style={{ color: "#98A1AD", fontWeight: 400, fontSize: 11 }}>코드로 시세 자동 연동</span></span>
          <span style={{ color: "#EF0107", fontSize: 12 }}>{krOpen ? "▲" : "▼"}</span>
        </div>
        {krOpen && (
          <div style={{ marginTop: 8, padding: 12, background: "#FDF7F7", border: "1px solid #F5DADA", borderRadius: 12 }} className="fadein">
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>

              <div>
                <span style={{ fontWeight: 800, fontSize: 15 }}>{sSel.symbol}</span>
                <span style={{ color: "#8B95A1", fontSize: 11.5, marginLeft: 7 }}>{sSel.name}</span>
              </div>
              <button style={{ ...S.ghost, padding: "4px 9px" }} onClick={() => setSSel(null)}>✕</button>
            </div>
            <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8 }}>
              {Object.entries(SECTORS).filter(([k]) => k !== "crypto").map(([k, s]) => (
                <button key={k} style={S.chip(sSec === k)} onClick={() => setSSec(k)}>{s.name}</button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 10.5, color: "#8B95A1", marginBottom: 2 }}>평단 ($)</div>
                <input style={S.input} type="number" step="any" value={sAvg} onChange={(e) => onAvg(e.target.value)} placeholder="80.9" />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 10.5, color: "#8B95A1", marginBottom: 2 }}>투입금액 (₩)</div>
                <input style={S.input} type="number" step="any" value={sAmt} onChange={(e) => onAmt(e.target.value)} placeholder="1000000" />
              </div>
              <div style={{ width: 80 }}>
                <div style={{ fontSize: 10.5, color: "#8B95A1", marginBottom: 2 }}>수량 (자동)</div>
                <input style={S.input} type="number" step="any" value={sQty} onChange={(e) => onQty(e.target.value)} placeholder="0" />
              </div>
            </div>
            <button style={{ ...S.btn, width: "100%" }} onClick={addOwned}>이 종목 등록</button>
          </div>
        )}
      </div>

      {/* 내 개별종목 테이블 */}
      <div style={S.card}>
        <div style={{ ...S.label, marginBottom: 4 }}>내 개별종목</div>
        {calc.rows.filter((r) => r.qty > 0).length === 0 && (
          <div style={{ fontSize: 12.5, color: "#98A1AD", padding: "6px 0" }}>위에서 검색해 종목을 등록하세요</div>
        )}
        {calc.rows.filter((r) => r.qty > 0).map((r) => (
          <div key={r.id}>
            <div style={{ ...S.row, cursor: "pointer" }} onClick={() => setEditId(editId === r.id ? null : r.id)}>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 13.5 }}>
                  {r.symbol} <span style={{ fontWeight: 400, color: "#8B95A1", fontSize: 11 }}>{r.type === "manual" ? "국내·수동" : r.type === "crypto" ? "코인" : SECTORS[r.sector].name}</span>
                </div>
                <div style={{ fontSize: 11.5, color: "#8B95A1", fontVariantNumeric: "tabular-nums" }}>
                  {r.qty}주 · 평단 {r.type === "manual" ? fmtKRW(r.avg) : fmtUSD(r.avg)}
                </div>
              </div>
              <div style={{ textAlign: "right", fontVariantNumeric: "tabular-nums" }}>
                <div style={{ fontWeight: 700, fontSize: 13.5 }}>{r.value > 0 ? fmtKRW(r.value) : "—"}</div>
                {r.plPct != null && <div style={{ fontSize: 11.5, color: upDown(r.pl), fontWeight: 700 }}>{fmtPct(r.plPct)}</div>}
              </div>
            </div>
            {editId === r.id && (
              <div style={{ display: "flex", gap: 6, alignItems: "center", padding: "8px 0", background: "#FAFBFC", borderRadius: 8, paddingLeft: 8, paddingRight: 8, marginBottom: 6 }} className="fadein">
                <input style={{ ...S.input, flex: 1 }} type="number" step="any" value={r.qty || ""} placeholder="수량" onChange={(e) => setH(r.id, "qty", +e.target.value || 0)} />
                <input style={{ ...S.input, flex: 1 }} type="number" step="any" value={r.avg || ""} placeholder={r.type === "manual" ? "평단₩" : "평단$"} onChange={(e) => setH(r.id, "avg", +e.target.value || 0)} />
                {r.type === "manual" && <input style={{ ...S.input, width: 66 }} value={r.code || ""} placeholder="코드" onChange={(e) => setH(r.id, "code", e.target.value.replace(/[^0-9]/g, "").slice(0, 6))} />}
                {r.type === "manual" && !r.live && <input style={{ ...S.input, width: 70 }} type="number" step="any" value={r.pk || ""} placeholder="현재가₩" onChange={(e) => setH(r.id, "pk", +e.target.value || 0)} />}
                <button style={{ ...S.plus, borderColor: "#E8EBEF", color: "#F04452" }} onClick={() => { delH(r.id); setEditId(null); }}>×</button>
              </div>
            )}
          </div>
        ))}
        <div style={{ fontSize: 10.5, color: "#A6AEBB", marginTop: 8 }}>행 탭=수정·삭제 · 국내 종목은 코드 6자리 입력 시 시세 자동, 없으면 현재가₩ 수동</div>
      </div>

      {/* 플랜 기본 종목 (접이식) */}
      <div style={S.card}>
        <div onClick={() => setPlanOpen(!planOpen)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
          <div style={S.label}>플랜 종목 · 섹터 내 비중 <span style={{ color: "#A6AEBB", textTransform: "none", letterSpacing: 0 }}>(적립 계산용)</span></div>
          <span style={{ color: "#EF0107", fontSize: 12 }}>{planOpen ? "▲" : "▼"}</span>
        </div>
        {planOpen && (
          <div style={{ marginTop: 6 }} className="fadein">
            {holdings.filter((h) => h.type !== "manual").map((h) => (
              <div key={h.id} style={{ display: "flex", gap: 6, alignItems: "center", padding: "6px 0", borderBottom: "1px solid #F3F5F8" }}>
                <div style={{ width: 62, fontWeight: 700, fontSize: 12 }}>{h.symbol}<div style={{ fontWeight: 400, fontSize: 9, color: "#A6AEBB" }}>{SECTORS[h.sector].name}</div></div>
                <input style={{ ...S.input, flex: 1 }} type="number" step="any" value={h.qty || ""} placeholder="수량" onChange={(e) => setH(h.id, "qty", +e.target.value || 0)} />
                <input style={{ ...S.input, flex: 1 }} type="number" step="any" value={h.avg || ""} placeholder="평단$" onChange={(e) => setH(h.id, "avg", +e.target.value || 0)} />
                <input style={{ ...S.input, width: 52 }} type="number" step="5" value={Math.round(h.w * 100) || ""} placeholder="비중" onChange={(e) => setH(h.id, "w", (+e.target.value || 0) / 100)} />
                <button style={{ ...S.plus, borderColor: "#E8EBEF", color: "#F04452" }} onClick={() => delH(h.id)}>×</button>
              </div>
            ))}
            <div style={{ fontSize: 10.5, color: "#A6AEBB", marginTop: 6 }}>비중=섹터 내 %(합 100 권장) — 적립 탭 매수금액 계산에 사용 · 코인 수량은 개수</div>
          </div>
        )}
      </div>

      {/* 고급 (접이식): AI 인식 · 백업 */}
      <div style={S.card}>
        <div onClick={() => setAdvOpen(!advOpen)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
          <div style={S.label}>고급 <span style={{ color: "#A6AEBB", textTransform: "none", letterSpacing: 0 }}>스크린샷 AI 인식 · 백업/복원</span></div>
          <span style={{ color: "#EF0107", fontSize: 12 }}>{advOpen ? "▲" : "▼"}</span>
        </div>
        {advOpen && (
          <div style={{ marginTop: 10 }} className="fadein">
            <div style={{ fontSize: 11.5, color: "#8B95A1", marginBottom: 8, lineHeight: 1.55 }}>
              📷 증권앱 캡처를 올리면 종목·수량·평단을 자동 추출합니다 (국내 종목은 원화 수동시세 등록).
            </div>
            <input style={{ ...S.input, marginBottom: 8 }} value={aiKey} onChange={(e) => setAiKey(e.target.value.trim())} placeholder="Anthropic API 키 (장당 몇 원 · 무료 대안: Claude 채팅)" />
            <label style={{ ...S.btn, display: "inline-block", opacity: importing ? 0.6 : 1, marginBottom: 14 }}>
              {importing ? "인식 중…" : "📷 스크린샷 선택"}
              <input type="file" accept="image/*" style={{ display: "none" }} disabled={importing}
                onChange={(e) => { const f = e.target.files?.[0]; if (f) aiImport(f); e.target.value = ""; }} />
            </label>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <button style={S.ghost} onClick={doBackup}>백업 생성</button>
              <button style={S.ghost} onClick={doRestore}>복원</button>
              <button style={{ ...S.ghost, color: "#F04452" }} onClick={doReset}>초기화</button>
            </div>
            <textarea style={{ ...S.input, height: 70, fontSize: 10.5, fontFamily: "monospace" }} value={backup} onChange={(e) => setBackup(e.target.value)}
              placeholder="백업: 버튼 → 생성된 텍스트 복사 보관 / 복원: 붙여넣고 복원" />
          </div>
        )}
      </div>

      <div style={{ margin: "14px 16px 22px", fontSize: 10.5, color: "#A6AEBB", lineHeight: 1.65 }}>
        시세: Finnhub(주식, 15분 내 지연 가능)·CoinGecko(코인)·open.er-api(환율) 무료 API 기준으로 정확성이 보장되지 않습니다. 본 앱과 시그널·후보 풀은 정보 제공 목적이며 투자자문·매수 추천이 아닙니다. 투자 판단과 책임은 본인에게 있습니다.
      </div>
    </div>
  );

  const TABS = [
    { id: "home", label: "현황", icon: "M3 12l9-9 9 9M5 10v10h14V10", render: Home },
    { id: "explore", label: "탐색", icon: "M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35", render: Explore },
    { id: "news", label: "뉴스", icon: "M4 5h16v14H4zM8 9h8M8 13h8M8 17h5", render: News },
    { id: "plan", label: "적립", icon: "M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11", render: Plan },
    { id: "set", label: "설정", icon: "M12 15a3 3 0 100-6 3 3 0 000 6zM19 12a7 7 0 11-14 0 7 7 0 0114 0z", render: Settings },
  ];

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <img src={logoData || "logo.png"} alt="" style={{ height: 34, width: 34, objectFit: "contain", filter: "drop-shadow(0 1px 3px rgba(0,0,0,.35))" }}
            onError={(e) => {
              if (logoData) { e.currentTarget.style.display = "none"; return; }
              const t = e.currentTarget;
              const alts = ["logo.jpg", "logo.jpeg", "logo.PNG", "logo.JPG"];
              const i = +(t.dataset.i || 0);
              if (i < alts.length) { t.dataset.i = i + 1; t.src = alts[i]; } else t.style.display = "none";
            }} />
          <div>
            <div style={{ fontWeight: 900, fontSize: 19, letterSpacing: 1.5, color: "#FFF", fontStyle: "italic" }}>
              COYG<span style={{ color: "rgba(255,255,255,.92)" }}>!</span>
            </div>
            <div style={{ fontSize: 9.5, color: "rgba(255,255,255,.85)", fontWeight: 600, letterSpacing: 0.5 }}>자산 코어·위성 — VICTORIA CONCORDIA CRESCIT</div>
          </div>
        </div>
        <div style={{ textAlign: "right", fontVariantNumeric: "tabular-nums" }}>
          <div style={{ fontSize: 11, color: "rgba(255,255,255,.75)" }}>총 평가</div>
          <div style={{ fontWeight: 700, fontSize: 14, color: "#FFF" }}>{fmtKRWc(calc.totV)}</div>
        </div>
      </div>

      {err && (
        <div onClick={() => setErr("")} style={{ margin: "10px 12px 0", padding: "10px 13px", background: "#FDECEC", border: "1px solid #F5C2C2", borderRadius: 12, fontSize: 12, color: "#C70008", cursor: "pointer" }}>
          {err} <span style={{ float: "right", opacity: 0.5 }}>✕</span>
        </div>
      )}

      {TABS.find((t) => t.id === tab)?.render()}

      {toast && (
        <div style={{ position: "fixed", bottom: 86, left: "50%", transform: "translateX(-50%)", background: "rgba(25,31,40,.92)", color: "#FFF", borderRadius: 22, padding: "9px 18px", fontSize: 12.5, fontWeight: 600, zIndex: 40, whiteSpace: "nowrap" }}>
          {toast}
        </div>
      )}

      <div style={S.tabbar}>
        {TABS.map((t) => (
          <button key={t.id} style={S.tabBtn(tab === t.id)} onClick={() => setTab(t.id)}>
            <Icon d={t.icon} />
            {t.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<InvestDashboard />);
</script>
<script>
  if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(function(){}); }
</script>
</body>
</html>
